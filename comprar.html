<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH StreetWear</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    

<header class="header">

    <a href="index.html" class="logo">
        <img src="images/logo.png" alt="">
    </a>

    <nav class="navbar">
        <a href=index.html>Início</a>
        <a href=produtos.html>Produtos</a>
        <a href=sobrenos.html>Contato</a>
        <a href=documentos.html>Documentos</a>
    </nav>

    <div class="icons">
        <div class="fas fa-shopping-cart" id="cart-btn"></div>
        <div class="fas fa-bars" id="menu-btn"></div>
    </div>

    <div class="cart-items-container">
        <div class="cart-total">
            <h3>Total: <span id="total-price">R$0.00</span></h3>
            <br>
            <a href="comprar.html" class="btn-buy">Comprar</a>
        </div>
    </div>
</header>
<br><br><br><br><br><br><br><br><br><br>
<section class="contact">

    <h1 class="heading"> <span>Finalizar a</span> Compra</h1>

    <div class="row">

        <form action="">
            <h3>preencha seus dados</h3>
            <div class="inputBox">
                <span class="fas fa-user"></span>
                <input type="text" placeholder="Nome Completo">
            </div>
            <div class="inputBox">
                <span class="fas fa-envelope"></span>
                <input type="email" placeholder="Email">
            </div>
            <div class="inputBox">
                <span class="fas fa-house-user"></span>
                <input type="text" placeholder="Endereço de entrega">
            </div>
            <div class="inputBox">
                <span class="fas fa-map-pin"></span>
                <input type="text" placeholder="CEP">
            </div>
            <div class="inputBox">
                <span class="fas fa-credit-card"></span>
                <input type="text" placeholder="Número do cartão">
            </div>
            <input type="submit" value="Finalizar Compra" class="btn">
        </form>

    </div>

</section>

<section class="footer">

    <div class="share">
        <a href="linkexterno.html" class="fab fa-facebook-f"></a>
        <a href="linkexterno.html" class="fab fa-twitter"></a>
        <a href="linkexterno.html" class="fab fa-instagram"></a>
    </div>

    <div class="credit">Purple Haze StreetWear <span>| Todos direitos reservados</span></div>

</section>

<script src="js/script.js"></script>

</body>
</html>
